services:
  postgres:
    image: postgres:16-alpine
    container_name: math-history-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: teachers_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - ./.docker/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d teachers_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-migrate:
    image: postgres:16-alpine
    container_name: math-history-db-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: admin
    volumes:
      - ./migrations:/migrations:ro
    command:
      - /bin/sh
      - -ec
      - |
        psql -h postgres -U admin -d teachers_db -v ON_ERROR_STOP=1 <<'SQL'
        DO $$$$
        BEGIN
          IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'postgres') THEN
            CREATE ROLE postgres;
          END IF;
        END
        $$$$;
        SQL

        table_exists="$$(psql -h postgres -U admin -d teachers_db -tAc "SELECT to_regclass('public.\"Teachers\"') IS NOT NULL;")"
        if [ "$$table_exists" = "t" ]; then
          echo "Migration skipped: schema already exists."
          exit 0
        fi

        sed -e '/transaction_timeout/d' -e 's/OWNER TO postgres/OWNER TO admin/g' /migrations/teachers_db_dump.sql \
          | psql -h postgres -U admin -d teachers_db -v ON_ERROR_STOP=1
    restart: "no"

  nuxt:
    image: node:20-alpine
    container_name: math-history-nuxt
    working_dir: /app
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: teachers_db
      DB_USER: admin
      DB_PASSWORD: admin
      DB_SSL: "false"
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"

  react-router:
    image: node:20-alpine
    container_name: math-history-react-router
    working_dir: /app/client
    depends_on:
      nuxt:
        condition: service_started
    environment:
      NODE_ENV: development
      VITE_SITE_URL: http://localhost:5173
      VITE_API_BASE_URL: http://nuxt:3000
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/client/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

