# Local stack: DynamoDB + MinIO + Serverless API + React client.
# For CI / server integration tests only, see docker-compose.test.yml.
#
# Usage (repo root):
#   docker compose up --build
#
#   React client:  http://localhost:5173
#   Serverless API: http://localhost:3000
#   DynamoDB Local: http://127.0.0.1:8000
#   MinIO (S3):    http://127.0.0.1:9000  (console :9001)
#
# Host-only API/dev (containers already up):
#   server/.env → DYNAMODB_ENDPOINT=http://127.0.0.1:8000 S3_ENDPOINT=http://127.0.0.1:9000
#   AWS_ACCESS_KEY_ID=local AWS_SECRET_ACCESS_KEY=locallocal

services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: math-history-dynamodb-local
    restart: unless-stopped
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    ports:
      - "8000:8000"
    volumes:
      - ./.docker/dynamodb:/data

  dynamodb-migrate:
    image: amazon/aws-cli:latest
    container_name: math-history-dynamodb-migrate
    depends_on:
      - dynamodb
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: eu-north-1
      AWS_EC2_METADATA_DISABLED: "true"
    volumes:
      - ./server/migration/table.json:/migration/table.json:ro
    restart: "no"
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        set -e
        ENDPOINT=http://dynamodb:8000
        i=0
        while [ "$$i" -lt 60 ]; do
          if aws dynamodb list-tables --endpoint-url "$$ENDPOINT" >/dev/null 2>&1; then
            break
          fi
          i=$$((i + 1))
          sleep 1
        done
        if [ "$$i" -ge 60 ]; then
          echo "DynamoDB did not become ready in time"
          exit 1
        fi
        if aws dynamodb describe-table --table-name math-history-ddb-local --endpoint-url "$$ENDPOINT" >/dev/null 2>&1; then
          echo "DynamoDB table math-history-ddb-local already exists."
          exit 0
        fi
        aws dynamodb create-table --cli-input-json file:///migration/table.json --endpoint-url "$$ENDPOINT"
        echo "DynamoDB table math-history-ddb-local created."

  dynamodb-seed:
    image: node:20-alpine
    container_name: math-history-dynamodb-seed
    working_dir: /app/server
    depends_on:
      dynamodb-migrate:
        condition: service_completed_successfully
    environment:
      AWS_REGION: eu-north-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_TABLE_NAME: math-history-ddb-local
      DYNAMODB_ENDPOINT: http://dynamodb:8000
    volumes:
      - ./:/app
      - /app/server/node_modules
    restart: "no"
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        set -e
        npm install --silent
        ENDPOINT="http://dynamodb:8000"
        TABLE="math-history-ddb-local"
        if node -e "
          const { DynamoDBClient, GetItemCommand } = require('@aws-sdk/client-dynamodb');
          const client = new DynamoDBClient({
            region: process.env.AWS_REGION,
            endpoint: process.env.DYNAMODB_ENDPOINT,
            credentials: { accessKeyId: 'local', secretAccessKey: 'local' },
          });
          client
            .send(new GetItemCommand({
              TableName: process.env.DYNAMODB_TABLE_NAME,
              Key: { pk: { S: 'CONFIG' }, sk: { S: 'LAYOUT' } },
            }))
            .then((r) => process.exit(r.Item ? 0 : 1))
            .catch(() => process.exit(1));
        "; then
          echo "DynamoDB seed already present, skipping."
          exit 0
        fi
        node scripts/load-teachers-dynamodb.mjs migration/data/teachers-seed.json "$$TABLE" "$$ENDPOINT"
        node scripts/load-graduates-dynamodb.mjs migration/data/graduates-seed.json "$$TABLE" "$$ENDPOINT"
        node scripts/load-layout-dynamodb.mjs migration/data/layout-seed.json "$$TABLE" "$$ENDPOINT"
        echo "DynamoDB seed complete."

  minio:
    image: minio/minio:latest
    container_name: math-history-minio-local
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: local
      MINIO_ROOT_PASSWORD: locallocal
    volumes:
      - ./.docker/minio:/data

  s3-init:
    image: minio/mc:latest
    container_name: math-history-s3-init
    depends_on:
      - minio
    restart: "no"
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" 2>/dev/null; do
          sleep 1
        done
        mc mb -p "local/math-history-server-data-local" || true
    environment:
      MINIO_ROOT_USER: local
      MINIO_ROOT_PASSWORD: locallocal

  server:
    image: node:20-alpine
    container_name: math-history-server
    working_dir: /app/server
    depends_on:
      dynamodb-seed:
        condition: service_completed_successfully
      s3-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: local
      AWS_REGION: eu-north-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: locallocal
      DYNAMODB_TABLE_NAME: math-history-ddb-local
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      S3_DATA_BUCKET: math-history-server-data-local
      S3_ENDPOINT: http://minio:9000
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/server/node_modules
    command: sh -c "npm install && npm run dev"

  react-router:
    image: node:20-alpine
    container_name: math-history-react-router
    working_dir: /app/client
    depends_on:
      server:
        condition: service_started
    environment:
      NODE_ENV: development
      VITE_SITE_URL: http://localhost:5173
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/client/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
