org: afjsolution
service: math-history-server
frameworkVersion: "4"

# Table / bucket: set DYNAMODB_TABLE_NAME and S3_DATA_BUCKET at deploy to match Terraform
# (e.g. math-history-server-ddb-stage). Falls back to ${service}-ddb-${sls:stage}.
custom:
  dynamodbTableName: ${env:DYNAMODB_TABLE_NAME, '${self:service}-ddb-${sls:stage}'}
  s3DataBucket: ${env:S3_DATA_BUCKET, '${self:service}-data-${sls:stage}'}
  logRetentionInDays:
    prod: 90
    default: 7
  # HTTP API JWT authorizer (set at deploy; see repo docs or Terraform cognito outputs).
  cognitoJwtIssuer: ${env:COGNITO_JWT_ISSUER}
  cognitoJwtAudience: ${env:COGNITO_JWT_AUDIENCE}

provider:
  name: aws
  region: ${aws:region}
  runtime: nodejs24.x
  architecture: arm64
  logRetentionInDays: ${self:custom.logRetentionInDays.${sls:stage}, self:custom.logRetentionInDays.default}
  versionFunctions: false
  memorySize: 256
  timeout: 29
  httpApi:
    authorizers:
      cognitoJwt:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: ${self:custom.cognitoJwtIssuer}
        audience:
          - ${self:custom.cognitoJwtAudience}
  iam:
    role:
      name: sls-tpl-${opt:stage, 'stage'}-role
      statements:
        - Effect: "Allow"
          Action:
            - "s3:ListBucket"
          Resource:
            - "arn:aws:s3:::${self:custom.s3DataBucket}"
        - Effect: "Allow"
          Action:
            - "s3:GetObject"
            - "s3:GetObjectAcl"
            - "s3:PutObject"
            - "s3:PutObjectAcl"
            - "s3:DeleteObject"
          Resource:
            - "arn:aws:s3:::${self:custom.s3DataBucket}/*"
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
            - dynamodb:TransactWriteItems
          Resource:
            - Fn::Sub:
                - 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoTable}'
                - DynamoTable: ${self:custom.dynamodbTableName}
            - Fn::Sub:
                - 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoTable}/index/*'
                - DynamoTable: ${self:custom.dynamodbTableName}
  stackTags:
    Name: "math-history-server"
  environment:
    # Aligned with server_v2/.env.example (override at deploy for prod secrets / table names).
    AWS_SDK_LOG_LEVEL: ${env:AWS_SDK_LOG_LEVEL, 'warn'}
    NODE_ENV: ${env:NODE_ENV, 'stage'}
    DYNAMODB_TABLE_NAME: ${self:custom.dynamodbTableName}
    DYNAMODB_ENDPOINT: ${env:DYNAMODB_ENDPOINT, ''}
    S3_DATA_BUCKET: ${self:custom.s3DataBucket}
    S3_ENDPOINT: ${env:S3_ENDPOINT, ''}
    CORS_ORIGIN: ${env:CORS_ORIGIN, ''}
  vpc:
    securityGroupIds:
      - ${env:SECURITY_GROUP_ID}
    subnetIds:
      - ${env:SUBNET_ID}

functions:
  api:
    handler: .build/index.handler
    events:
      # Public routes (no JWT at the gateway — same as publicResource in code)
      - httpApi:
          path: /api/openapi
          method: GET
      - httpApi:
          path: /api/teachers
          method: GET
      - httpApi:
          path: /api/teachers/filters
          method: GET
      - httpApi:
          path: /api/teachers/by-slug/{slug}
          method: GET
      - httpApi:
          path: /api/layout
          method: GET
      - httpApi:
          path: /api/graduates/years
          method: GET
      - httpApi:
          path: /api/graduates/specialties
          method: GET
      - httpApi:
          path: /api/graduates
          method: GET
      - httpApi:
          path: /api/graduates/{year}
          method: GET
      - httpApi:
          path: /{proxy+}
          method: "*"
          authorizer:
            name: cognitoJwt

plugins:
  - serverless-plugin-resource-tagging
  - serverless-offline
