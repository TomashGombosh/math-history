org: afjsolution
service: math-history-server
frameworkVersion: "4"

provider:
  name: aws
  region: ${aws:region}
  runtime: nodejs24.x
  architecture: arm64
  logRetentionInDays: ${self:custom.logRetentionInDays.${sls:stage}, self:custom.logRetentionInDays.default}
  versionFunctions: false
  memorySize: 256
  timeout: 29
  iam:
    role:
      name: sls-tpl-${opt:stage, 'stage'}-role
      statements:
        # - Effect: Allow
        #   Action:
        #     - secretsmanager:GetSecretValue
        #   Resource:
        #     - arn:aws:secretsmanager:${aws:region}:${aws:accountId}:secret:${env:APP_SECRET_ID}*
        - Effect: "Allow"
          Action:
            - "s3:ListBucket"
          Resource:
            - "arn:aws:s3:::${self:service}-data-${opt:stage, 'stage'}"
        - Effect: "Allow"
          Action:
            - "s3:GetObject"
            - "s3:GetObjectAcl"
            - "s3:PutObject"
            - "s3:PutObjectAcl"
            - "s3:DeleteObject"
          Resource:
            - "arn:aws:s3:::${self:service}-data-${opt:stage, 'stage'}/*"
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
            - dynamodb:TransactWriteItems
          Resource:
            - Fn::GetAtt: [MainTable, Arn]
            - Fn::Join:
                - ""
                - - Fn::GetAtt: [MainTable, Arn]
                  - "/index/*"
  stackTags:
    Name: "math-history-server"
  environment:
    NODE_ENV: ${env:NODE_ENV}
    # Override via .env for serverless-offline + DynamoDB Local (see docker-compose dynamodb service)
    DYNAMODB_TABLE_NAME: ${env:DYNAMODB_TABLE_NAME, '${self:service}-ddb-${sls:stage}'}
    DYNAMODB_ENDPOINT: ${env:DYNAMODB_ENDPOINT, ''}
    S3_DATA_BUCKET: ${self:service}-data-${sls:stage}
  vpc:
    securityGroupIds:
      - ${env:SECURITY_GROUP_ID}
    subnetIds:
      - ${env:SUBNET_ID}

functions:
  api:
    handler: .build/index.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: "*"

resources:
  Resources:
    MainTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-ddb-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
          - AttributeName: gsi1pk
            AttributeType: S
          - AttributeName: gsi1sk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: gsi1pk
                KeyType: HASH
              - AttributeName: gsi1sk
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

plugins:
  - serverless-plugin-resource-tagging
  - serverless-offline

custom:
  logRetentionInDays:
    prod: 90
    default: 7
