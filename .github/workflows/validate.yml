name: Validate (Lint & Tests)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - development
      - main

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  server-validate:
    name: Lint & Test (Server)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: server_v2
        run: npm ci

      - name: Run lint
        working-directory: server_v2
        run: npm run lint

      - name: Run tests
        working-directory: server_v2
        run: npm run test


  client-validate:
    name: Lint & Test (Client)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Run lint
        working-directory: client
        run: npm run lint

      - name: Run tests
        working-directory: client
        run: npm run test