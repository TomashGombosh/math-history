name: Validate (Lint & Tests)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - development
      - main

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  server-validate:
    name: Lint & Test (Server)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start DynamoDB Local & MinIO
        run: docker compose up -d dynamodb minio

      # Use host ports (127.0.0.1) + --network host so one-off aws/mc containers do not hang on compose DNS.
      - name: Wait for DynamoDB Local (port 8000)
        run: |
          for i in $(seq 1 90); do
            if nc -z 127.0.0.1 8000 2>/dev/null; then
              echo "DynamoDB Local is up."
              exit 0
            fi
            sleep 1
          done
          echo "Timeout waiting for DynamoDB on 8000"
          exit 1

      - name: Create DynamoDB table (migration)
        run: |
          docker run --rm --network host \
            -v "${GITHUB_WORKSPACE}/server_v2/migration/table.json:/migration/table.json:ro" \
            -e AWS_ACCESS_KEY_ID=local \
            -e AWS_SECRET_ACCESS_KEY=local \
            -e AWS_DEFAULT_REGION=eu-north-1 \
            amazon/aws-cli:latest \
            sh -ec '
              ENDPOINT=http://127.0.0.1:8000
              if aws dynamodb describe-table --table-name math-history-ddb-local --endpoint-url "$ENDPOINT" >/dev/null 2>&1; then
                echo "Table math-history-ddb-local already exists."
                exit 0
              fi
              aws dynamodb create-table --cli-input-json file:///migration/table.json --endpoint-url "$ENDPOINT"
              echo "Table created."
            '

      - name: Wait for MinIO (port 9000)
        run: |
          for i in $(seq 1 90); do
            if nc -z 127.0.0.1 9000 2>/dev/null; then
              echo "MinIO is up."
              exit 0
            fi
            sleep 1
          done
          echo "Timeout waiting for MinIO on 9000"
          exit 1

      - name: Create S3 bucket (MinIO init)
        run: |
          docker run --rm --network host \
            -e MINIO_ROOT_USER=local \
            -e MINIO_ROOT_PASSWORD=locallocal \
            minio/mc:latest \
            sh -ec '
              i=0
              until mc alias set local http://127.0.0.1:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" 2>/dev/null; do
                i=$((i + 1))
                if [ "$i" -ge 90 ]; then echo "mc: timeout connecting to MinIO"; exit 1; fi
                sleep 1
              done
              mc mb -p "local/math-history-server-data-local" || true
              echo "Bucket ready."
            '

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: server_v2
        run: npm ci

      - name: Run lint
        working-directory: server_v2
        run: npm run lint

      - name: Run tests
        working-directory: server_v2
        env:
          AWS_REGION: eu-north-1
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: locallocal
          NODE_ENV: test
          DYNAMODB_TABLE_NAME: math-history-ddb-local
          DYNAMODB_ENDPOINT: http://127.0.0.1:8000
          S3_DATA_BUCKET: math-history-server-data-local
          S3_ENDPOINT: http://127.0.0.1:9000
          SECURITY_GROUP_ID: sg-xxxxxxxxxxxxxxxxx
          SUBNET_ID: subnet-xxxxxxxxxxxxxxxxx
          RATE_LIMIT: 100
          BURST_LIMIT: 200
          JWT_SECRET: dev_secret
          JWT_EXPIRES_IN: 8h
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
          TRUST_API_GATEWAY_AUTH: "false"
        run: npm run test

      - name: Stop containers
        if: always()
        run: docker compose down -v


  client-validate:
    name: Lint & Test (Client)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Run lint
        working-directory: client
        run: npm run lint

      - name: Run build
        working-directory: client
        env:
          VITE_API_URL: http://localhost:3000
        run: npm run build
