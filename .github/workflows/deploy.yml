# Deploys infra stacks after merge. Branch → GitHub Environment:
#   development → environment "stage" (stage AWS)
#   main        → environment "production" (prod AWS)
#
# Per-environment secrets (stage / production):
#   AWS_ROLE_TO_ASSUME     — IAM role ARN for GitHub OIDC
#   AWS_ACCOUNT_ID         — expected account (validated before apply)
#   TF_STATE_BUCKET        — S3 bucket for Terraform state
#   TF_LOCK_TABLE          — DynamoDB table name for state locking
#
# Repository variable (optional): AWS_REGION (default eu-north-1 in jobs below).
#
# Bootstrap once per account: create the state bucket and lock table, and IAM roles
# trusted by GitHub OIDC (DynamoDB, Cognito, S3 data bucket, Serverless deploy, etc.).
#
# Per-environment secret for S3 uploads bucket stack: AWS_S3_DATA_ROLE_TO_ASSUME
#
# Serverless deploy job (same branch → environment as Terraform):
#   Per-environment secrets: AWS_SERVERLESS_ROLE_TO_ASSUME, AWS_ACCOUNT_ID
#   Optional secret: SERVERLESS_ACCESS_KEY — if Serverless Framework org/dashboard requires it for deploy
#   Per-environment variables (recommended):
#     COGNITO_JWT_ISSUER, COGNITO_JWT_AUDIENCE — HTTP API JWT authorizer (match Terraform Cognito outputs)
#     SECURITY_GROUP_ID, SUBNET_ID — Lambda VPC (required by server_v2/serverless.yml)
#     CORS_ORIGIN — optional browser origin for API CORS
#     SITE_URL — same canonical public origin as VITE_SITE_URL (https://CLOUDFRONT_ALIAS, no trailing slash).
#       Required for correct sitemap <loc> when CloudFront uses AllViewerExceptHostHeader (Host at Lambda is execute-api).
#   Naming: Serverless --stage is stage (development branch) or prod (main), matching TF_VAR_environment.
#
# Client static site (same branch → environment as Serverless API):
#   Creates private S3 bucket via client/serverless.yml (no website hosting; CloudFront in Terraform).
#   After deploy, syncs client/dist to the bucket. IAM for the deploy role must allow s3:PutObject,
#   s3:DeleteObject, s3:ListBucket on arn:aws:s3:::math-history-client-static-* (and objects).
#   Per-environment secrets: AWS_SERVERLESS_ROLE_TO_ASSUME, AWS_ACCOUNT_ID, SERVERLESS_ACCESS_KEY (optional)
#   Per-environment variables (recommended): VITE_API_URL, VITE_SITE_URL — baked into the Vite build
#
# CloudFront (Terraform, after Serverless API + client bucket/sync):
#   Per-environment secret: AWS_CLOUDFRONT_ROLE_TO_ASSUME — OIDC role with CloudFront + S3 bucket policy
#   Per-environment variables (required):
#     ACM_CERTIFICATE_ARN — ACM cert in us-east-1 covering CLOUDFRONT_ALIAS (SNI for CloudFront)
#     HTTP_API_EXECUTE_API_DOMAIN — HTTP API hostname only, e.g. abc.execute-api.eu-north-1.amazonaws.com
#     CLOUDFRONT_ALIAS — alternate domain (production: math-history.afj-solution.com; stage: math-history-stage.afj-solution.com)
#   Optional variable: CLOUDFRONT_S3_BUCKET — overrides default math-history-client-static-<stage|prod>
#   Behaviors: /api/* and /sitemap.xml → API origin; default → S3 SPA (index.html + 403/404 → index.html)

name: Deploy application

on:
  push:
    branches:
      - development
      - main

concurrency:
  group: deploy-infra-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy-dynamodb:
    name: Terraform apply (DynamoDB)
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'stage' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve target environment
        id: target
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "tf_env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tf_env=stage" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply DynamoDB stack
        uses: ./.github/actions/terraform-aws-apply
        with:
          working-directory: infra/dynamodb
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DYNAMODB_ROLE_TO_ASSUME }}
          expected-aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          state-bucket: ${{ vars.TF_STATE_BUCKET }}
          lock-table: ${{ vars.TF_LOCK_TABLE }}
          state-key: dynamodb/${{ steps.target.outputs.tf_env }}.tfstate
          tf-environment: ${{ steps.target.outputs.tf_env }}

  deploy-cognito:
    name: Terraform apply (Cognito)
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'stage' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve target environment
        id: target
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "tf_env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tf_env=stage" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply Cognito stack
        uses: ./.github/actions/terraform-aws-apply
        with:
          working-directory: infra/cognito
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_COGNITO_ROLE_TO_ASSUME }}
          expected-aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          state-bucket: ${{ vars.TF_STATE_BUCKET }}
          lock-table: ${{ vars.TF_LOCK_TABLE }}
          state-key: cognito/${{ steps.target.outputs.tf_env }}.tfstate
          tf-environment: ${{ steps.target.outputs.tf_env }}

  deploy-s3-image-bucket:
    name: Terraform apply (S3 uploads)
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'stage' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve target environment
        id: target
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "tf_env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tf_env=stage" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply S3 data bucket stack
        uses: ./.github/actions/terraform-aws-apply
        with:
          working-directory: infra/s3-data
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_S3_DATA_ROLE_TO_ASSUME }}
          expected-aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          state-bucket: ${{ vars.TF_STATE_BUCKET }}
          lock-table: ${{ vars.TF_LOCK_TABLE }}
          state-key: s3-data/${{ steps.target.outputs.tf_env }}.tfstate
          tf-environment: ${{ steps.target.outputs.tf_env }}

  deploy-server:
    name: Deploy server (Serverless)
    runs-on: ubuntu-24.04
    needs: [deploy-dynamodb, deploy-cognito, deploy-s3-image-bucket]
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'stage' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    defaults:
      run:
        working-directory: server_v2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve target environment
        id: target
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "tf_env=prod" >> "$GITHUB_OUTPUT"
            echo "node_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "tf_env=stage" >> "$GITHUB_OUTPUT"
            echo "node_env=stage" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_SERVERLESS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS account
        env:
          EXPECTED: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ACTUAL=$(aws sts get-caller-identity --query Account --output text)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "AWS account mismatch: expected ${EXPECTED}, got ${ACTUAL}"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server_v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Serverless deploy
        env:
          DYNAMODB_TABLE_NAME: math-history-server-ddb-${{ steps.target.outputs.tf_env }}
          S3_DATA_BUCKET: math-history-server-data-${{ steps.target.outputs.tf_env }}
          COGNITO_JWT_ISSUER: ${{ vars.COGNITO_JWT_ISSUER }}
          COGNITO_JWT_AUDIENCE: ${{ vars.COGNITO_JWT_AUDIENCE }}
          NODE_ENV: ${{ steps.target.outputs.node_env }}
          SECURITY_GROUP_ID: ${{ vars.SECURITY_GROUP_ID }}
          SUBNET_ID: ${{ vars.SUBNET_ID }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          SITE_URL: ${{ vars.VITE_SITE_URL }}
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
        run: npx serverless deploy --stage ${{ steps.target.outputs.tf_env }} --region ${{ env.AWS_REGION }}

  deploy-client-static:
    name: Deploy client (static site)
    runs-on: ubuntu-24.04
    needs: [deploy-dynamodb, deploy-cognito, deploy-s3-image-bucket]
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'stage' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve target environment
        id: target
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "tf_env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tf_env=stage" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_SERVERLESS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS account
        env:
          EXPECTED: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ACTUAL=$(aws sts get-caller-identity --query Account --output text)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "AWS account mismatch: expected ${EXPECTED}, got ${ACTUAL}"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build client
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
        run: npm run build

      - name: Serverless deploy (S3 bucket stack)
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          STATIC_SITE_DOMAIN: ${{ vars.STATIC_SITE_DOMAIN }}
        run: npx serverless deploy --stage ${{ steps.target.outputs.tf_env }} --region ${{ env.AWS_REGION }}

      - name: Sync build to S3
        env:
          BUCKET: math-history-client-static-${{ steps.target.outputs.tf_env }}
        run: |
          set -euo pipefail
          aws s3 sync dist/ "s3://${BUCKET}/" --delete --only-show-errors

  deploy-cloudfront:
    name: Terraform apply (CloudFront)
    runs-on: ubuntu-24.04
    needs: [deploy-server, deploy-client-static]
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'stage' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_VAR_acm_certificate_arn: ${{ vars.ACM_CERTIFICATE_ARN }}
      TF_VAR_api_gateway_domain_name: ${{ vars.HTTP_API_EXECUTE_API_DOMAIN }}
      TF_VAR_cloudfront_alias: ${{ vars.CLOUDFRONT_ALIAS }}
      TF_VAR_s3_bucket_name: ${{ vars.CLOUDFRONT_S3_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve target environment
        id: target
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "tf_env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tf_env=stage" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply CloudFront stack
        uses: ./.github/actions/terraform-aws-apply
        with:
          working-directory: infra/cloudfront
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_CLOUDFRONT_ROLE_TO_ASSUME }}
          expected-aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          state-bucket: ${{ vars.TF_STATE_BUCKET }}
          lock-table: ${{ vars.TF_LOCK_TABLE }}
          state-key: cloudfront/${{ steps.target.outputs.tf_env }}.tfstate
          tf-environment: ${{ steps.target.outputs.tf_env }}
